name: Project control

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-project-control:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate repository control
        run: python scripts/validate_project_control.py --repository armpitpete/project-folder-checker

      - name: Test all audit classifications
        run: python scripts/test_audit_project_controls.py

      - name: Test exact migration-register import
        run: python scripts/test_build_existing_repository_migration_register.py

      - name: Compile Python
        run: |
          python -m py_compile scripts/validate_project_control.py
          python -m py_compile scripts/audit_project_controls.py
          python -m py_compile scripts/test_audit_project_controls.py
          python -m py_compile scripts/build_existing_repository_migration_register.py
          python -m py_compile scripts/run_existing_repository_migration_register_safe.py
          python -m py_compile scripts/test_build_existing_repository_migration_register.py
          python -m py_compile scripts/test_windows_utf8_subprocess.py
          python -m py_compile scripts/test_windows_safe_repository_scan.py

  parse-powershell:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Parse PowerShell tools
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $Files = @(
            'tools/New-OrderProject.ps1',
            'tools/Run-ProjectControlAudit.ps1',
            'tools/Prove-Central-Project-Control.ps1',
            'tools/Install-Central-Project-Control.ps1',
            'tools/Build-ExistingRepositoryMigrationRegister.ps1'
          )
          foreach ($File in $Files) {
            $Tokens = $null
            $Errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $File),
              [ref]$Tokens,
              [ref]$Errors
            ) | Out-Null
            if ($Errors.Count -gt 0) {
              $Errors | ForEach-Object { Write-Error "${File}: $_" }
              exit 1
            }
            Write-Host "PASS: $File"
          }

      - name: Test UTF-8 subprocess decoding on Windows
        shell: pwsh
        run: python scripts/test_windows_utf8_subprocess.py

      - name: Test safe repository traversal on Windows
        shell: pwsh
        run: python scripts/test_windows_safe_repository_scan.py

      - name: Test repository probes through GitHub CLI
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          . .\tools\New-OrderProject.ps1 -LibraryOnly

          $Existing = Test-RemoteRepositoryExists -Repository 'armpitpete/project-folder-checker'
          if (-not $Existing) {
            throw 'Existing repository probe incorrectly returned false.'
          }

          $AbsentRepository = 'armpitpete/definitely-absent-project-control-probe-${{ github.run_id }}'
          $Absent = Test-RemoteRepositoryExists -Repository $AbsentRepository
          if ($Absent) {
            throw 'Absent repository probe incorrectly returned true.'
          }

          Write-Host 'PASS: existing and absent repository probes are distinguished'
