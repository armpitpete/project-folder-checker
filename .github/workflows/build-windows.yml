name: Build Windows app

on:
  push:
    branches:
      - main
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install pyinstaller

      - name: Build executable
        run: python -m PyInstaller --onefile --windowed --name "Project Folder Checker" "src\Project Folder Checker.pyw"

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: Project-Folder-Checker-Windows
          path: "dist/Project Folder Checker.exe"

      - name: Attach executable to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: "dist/Project Folder Checker.exe"
